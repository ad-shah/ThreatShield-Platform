input {
  http_poller {
    urls => {
      indicators => {
        method => "get"
        url => "http://host.docker.internal:8000/api/indicators?limit=1000"
        headers => { "Accept" => "application/json" }
      }
    }
    schedule => { cron => "*/5 * * * *" }
    codec => "json"
    type => "tip_indicator"
  }
}

filter {
  if [type] == "tip_indicator" {
    split { field => "data" }
    mutate {
      rename => {
        "[data][indicator]"   => "indicator"
        "[data][type]"        => "indicator_type"
        "[data][risk_score]"  => "risk_score"
        "[data][source]"      => "feed_source"
        "[data][blocked]"     => "is_blocked"
        "[data][categories]"  => "categories"
        "[data][last_seen]"   => "@timestamp"
        "[data][country]"     => "geo_country"
        "[data][description]" => "description"
      }
    }
    mutate {
      remove_field => ["data", "total", "headers", "host"]
    }
    mutate {
      convert => { "risk_score" => "integer" }
    }
    if [risk_score] and [risk_score] >= 90 {
      mutate { add_field => { "risk_level" => "CRITICAL" } }
    } else if [risk_score] and [risk_score] >= 70 {
      mutate { add_field => { "risk_level" => "HIGH" } }
    } else if [risk_score] and [risk_score] >= 50 {
      mutate { add_field => { "risk_level" => "MEDIUM" } }
    } else {
      mutate { add_field => { "risk_level" => "LOW" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "threat-indicators-%{+YYYY.MM.dd}"
    document_id => "%{indicator}_%{feed_source}"
  }
  if [risk_level] == "CRITICAL" {
    stdout { codec => rubydebug }
  }
}
